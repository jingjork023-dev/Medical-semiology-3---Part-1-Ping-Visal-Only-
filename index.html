                { q: "Wall thickening measurement (US):", a: 2, options: ["1mm", "2mm", "3mm", "5mm"] },
                { q: "Murphy's Sign:", a: 1, options: ["Reflexes", "Pain on gallbladder pressure", "Bowel sounds", "Jaundice check"] },
                { q: "Lab finding for infection/inflammation:", a: 1, options: ["Low RBC", "Elevated WBC", "Low sugar", "Low enzymes"] },
                { q: "Gallstone Ileus:", a: 1, options: ["Cancer", "Small bowel obstruction by large stone", "Biliary tree infection", "Absent gallbladder"] }
            ]}
        ];

        let audioCtx = null;
        function playTone(freq, type, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = "";
            let globalIdx = 0;

            quizData.forEach((section) => {
                const h = document.createElement('div');
                h.className = 'category-header rounded-r-lg';
                h.innerText = section.category;
                container.appendChild(h);

                section.questions.forEach((qObj) => {
                    const qDiv = document.createElement('div');
                    qDiv.className = 'p-5 border rounded-xl bg-white shadow-sm transition-all duration-300 relative group border-gray-100';
                    qDiv.id = `q-wrapper-${globalIdx}`;
                    qDiv.innerHTML = `
                        <p class="font-bold text-gray-800 mb-4">${globalIdx + 1}. ${qObj.q}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="q-grid-${globalIdx}">
                            ${qObj.options.map((opt, oIdx) => `
                                <label class="flex items-center p-3 border rounded-lg hover:border-blue-400 hover:bg-blue-50 cursor-pointer transition">
                                    <input type="radio" name="q${globalIdx}" value="${oIdx}" class="hidden" onchange="handleAnswer(${globalIdx}, ${oIdx}, ${qObj.a})">
                                    <span class="text-sm text-gray-700">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(qDiv);
                    globalIdx++;
                });
            });
            document.getElementById('total-questions').textContent = globalIdx;
        }

        function handleAnswer(qIdx, selected, correct) {
            const grid = document.getElementById(`q-grid-${qIdx}`);
            const labels = grid.querySelectorAll('label');
            const wrapper = document.getElementById(`q-wrapper-${qIdx}`);
            
            grid.classList.add('disabled-labels');
            
            if (selected === correct) {
                labels[selected].classList.add('option-correct');
                playCorrect();
            } else {
                labels[selected].classList.add('option-incorrect');
                labels[correct].classList.add('option-correct');
                playWrong();
            }
            wrapper.classList.add('bg-gray-50');
        }

        function calculateFinalScore() {
            let totalCorrect = 0;
            let totalAnswered = 0;
            let totalQ = 0;

            quizData.forEach(s => {
                s.questions.forEach((q, idx) => {
                    const selected = document.querySelector(`input[name="q${totalQ}"]:checked`);
                    if (selected) {
                        totalAnswered++;
                        if (parseInt(selected.value) === q.a) totalCorrect++;
                    }
                    totalQ++;
                });
            });

            document.getElementById('final-score').textContent = totalCorrect;
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });
        }

        function resetAll() {
            initQuiz();
            document.getElementById('result-box').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
